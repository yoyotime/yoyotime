name: yoyotime
description: Yoyotime - 安静地了解世界
publish_to: 'none'
version: 0.5.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0
  dio: ^5.4.3+1
  intl: ^0.17.0
  cached_network_image: ^3.3.1
  timeago: ^3.3.0
  flex_color_scheme: ^7.3.1
  flutter_tts: 4.2.3
  flutter_html: ^3.0.0-beta.2
  webfeed: ^0.7.0
  share_plus: ^7.2.2
  speech_to_text: ^6.6.0
  package_info_plus: ^5.0.1
  open_filex: ^4.4.0
  home_widget: ^0.6.0
  screenshot: ^3.0.0
  url_launcher: ^6.2.6
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/config/sources.json
    - assets/config/tone_rules.json
    - assets/config/app_config.json
