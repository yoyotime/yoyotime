name: yoyotime
description: Yoyotime - 安静地了解世界
publish_to: 'none'
version: 0.4.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0
  dio: ^5.4.3+1
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  timeago: ^3.7.0
  flex_color_scheme: ^7.3.1
  flutter_tts: ^4.0.2
  webfeed: ^0.8.0
  xml: ^6.5.0
  share_plus: ^10.0.0
  speech_to_text: ^7.4.0
  package_info_plus: ^8.0.0
  open_filex: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/config/sources.json
    - assets/config/tone_rules.json
    - assets/config/app_config.json
