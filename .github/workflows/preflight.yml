name: 颅脑测试

on:
  push:
    branches: [test-*, preview-*, dev-*]
  workflow_dispatch:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: 颅脑测试
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: 1/4 依赖解析
        run: flutter pub get

      - name: 导出 pubspec.lock
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pubspec-lock
          path: pubspec.lock
          retention-days: 1

      - name: 2/4 静态分析（有 error 就失败）
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: 3/4 单元测试
        run: flutter test

      - name: 4/4 关键文件检查
        run: |
          echo "检查关键文件..."
          for f in lib/main.dart lib/app.dart pubspec.yaml android/app/src/main/AndroidManifest.xml assets/config/sources.json assets/config/tone_rules.json; do
            if [ ! -f "$f" ]; then
              echo "❌ 缺失: $f"
              exit 1
            fi
          done
          echo "✅ 关键文件完整"

      - name: 结果
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 颅脑测试通过，可以合并到 main"
          else
            echo "❌ 颅脑测试失败，请修复后再合并"
          fi
